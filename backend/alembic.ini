# alembic.ini — Alembic configuration for DockHeal

[alembic]
# Path to migration scripts, relative to this file
script_location = app/db/migrations

# Template for new revision filenames
file_template = %%(rev)s_%%(slug)s

# Prepend sys.path so that `app` package is importable during migrations
prepend_sys_path = .

# Timezone for revision timestamps
timezone = UTC

# SQLAlchemy URL — overridden at runtime from environment in env.py
# Leave blank here; env.py reads DATABASE_URL from .env
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
